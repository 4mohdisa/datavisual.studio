name: CI

# Tests that don't run automatically are documentation. This runs the hermetic
# gate on every push/PR to main: backend pytest + the Next build + the restore
# drill. No servers, no network, no secrets.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          uv sync --group dev
          cd frontend && npm ci

      - name: Backend tests (hermetic)
        run: uv run pytest -p no:warnings -q

      - name: Frontend unit tests (Vitest + RTL)
        run: cd frontend && npm run test:unit

      - name: Frontend build
        run: cd frontend && npm run build

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium

      - name: E2E (Playwright — open mode, LLM-free journeys)
        run: cd frontend && npm run test:e2e
        env:
          E2E_PORT: '3100'

      - name: Restore drill (backup → restore → keys decrypt)
        run: ./scripts/restore-test.sh
